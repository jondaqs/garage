<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1E40AF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)"/>

  <!-- Subtle inner shadow/highlight -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- Wrench body — angled, modern geometric style -->
  <g transform="translate(256,256) rotate(-45)">
    <!-- Wrench shaft -->
    <rect x="-24" y="-120" width="48" height="240" rx="24" fill="white"/>

    <!-- Wrench head (top) — open jaw -->
    <path d="M-52,-120 L-52,-170 A52,52 0 0,1 52,-170 L52,-120 L28,-120 L28,-148 A28,28 0 0,0 -28,-148 L-28,-120 Z" fill="white"/>

    <!-- Wrench head (bottom) — closed ring -->
    <circle cx="0" cy="144" r="52" fill="white"/>
    <circle cx="0" cy="144" r="28" fill="url(#bg)"/>
  </g>

  <!-- Checkmark accent — overlaid in the bottom-right area -->
  <path d="M310,310 L350,350 L420,260" fill="none" stroke="#34D399" stroke-width="36" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small dot accent for polish -->
  <circle cx="420" cy="260" r="4" fill="#34D399"/>
</svg>